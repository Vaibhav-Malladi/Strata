name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show Python version
        run: python --version

      - name: Compile source
        run: python -m compileall -q .

      - name: Python 3.11 source grammar audit
        if: matrix.python-version != '3.13'
        shell: python
        run: |
          import ast
          from pathlib import Path

          skipped_parts = {
              ".git",
              ".aidc",
              ".pytest_cache",
              "__pycache__",
              ".venv",
              "venv",
              ".codex-venv",
              "build",
              "dist",
          }

          paths = [
              path
              for path in Path(".").rglob("*.py")
              if not any(part in skipped_parts for part in path.parts)
          ]

          for path in paths:
              ast.parse(
                  path.read_text(encoding="utf-8"),
                  filename=str(path),
                  feature_version=(3, 11),
              )

          print(f"Python 3.11 grammar audit passed: {len(paths)} files")

      - name: Install editable package
        if: matrix.python-version == '3.13'
        run: python -m pip install -e .

      - name: Run tests
        if: matrix.python-version == '3.13'
        run: python tests.py

      - name: Run tests package entrypoint
        if: matrix.python-version == '3.13'
        run: python tests/run.py