name: Publish to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish package
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          ref = os.environ["GITHUB_REF"]
          prefix = "refs/tags/v"
          if not ref.startswith(prefix):
              raise SystemExit(
                  f"Publishing requires a v-prefixed tag, but GITHUB_REF is {ref!r}."
              )

          tag_version = ref.removeprefix(prefix)
          with Path("pyproject.toml").open("rb") as file:
              package_version = tomllib.load(file)["project"]["version"]

          if tag_version != package_version:
              raise SystemExit(
                  "Tag/version mismatch: "
                  f"tag v{tag_version} does not match pyproject.toml version "
                  f"{package_version}."
              )

          print(f"Tag v{tag_version} matches pyproject.toml.")
          PY

      - name: Install package and build tooling
        run: |
          python -m pip install --upgrade build twine
          python -m pip install .

      - name: Run tests
        run: python tests.py

      - name: Build and check package
        run: |
          python -m build
          python -m twine check dist/*

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
